<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>インターハイ予選 出場者 2026</title>
  <style>
    :root {
      --bg: #edf2f0;
      --panel: rgba(255,255,255,0.96);
      --ink: #16212a;
      --muted: #68737d;
      --line: rgba(22,33,42,0.12);
      --line-strong: rgba(22,33,42,0.2);
      --accent: #0a6f88;
      --accent-strong: #094b61;
      --accent-soft: #e9f6f7;
      --school: #f7f4ee;
      --shadow: 0 18px 46px rgba(22,33,42,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f7faf9 0%, var(--bg) 100%);
    }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 30px 18px 48px; }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }
    .hero { padding: 26px 28px; margin-bottom: 16px; }
    h1 { margin: 0 0 10px; font-size: clamp(28px, 4.5vw, 46px); line-height: 1.06; letter-spacing: 0; }
    .subtitle { margin: 0; color: var(--muted); line-height: 1.7; max-width: 960px; }
    .nav { display: flex; flex-wrap: wrap; gap: 10px 18px; margin-top: 18px; }
    .nav a { color: var(--accent); text-decoration: none; font-weight: 800; }
    .panel { padding: 16px; margin-bottom: 16px; }
    .controls {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 14px;
      align-items: end;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 13px;
      font: inherit;
      background: white;
      color: var(--ink);
    }
    .summary { margin-top: 12px; color: var(--muted); line-height: 1.6; font-size: 13px; font-weight: 700; }
    .group-list {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
      overflow: hidden;
    }
    .prefecture-group + .prefecture-group { border-top: 3px solid #d8e4e3; }
    .prefecture-title {
      padding: 13px 18px;
      background: #e7f3f4;
      color: var(--accent-strong);
      font-size: 19px;
      font-weight: 800;
      border-left: 5px solid var(--accent);
    }
    .school-group { border-top: 1px solid var(--line-strong); }
    .school-title {
      padding: 11px 18px;
      background: var(--school);
      font-weight: 800;
      color: #2e3a42;
      letter-spacing: 0;
    }
    .participant-header,
    .participant-row {
      display: grid;
      grid-template-columns: minmax(150px, 0.9fr) 48px 48px minmax(320px, 2.8fr);
      gap: 12px;
      align-items: start;
    }
    .participant-header {
      padding: 7px 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      background: #fafafa;
      letter-spacing: 0.04em;
    }
    .participant-row {
      padding: 9px 18px;
      border-top: 1px solid var(--line);
    }
    .participant-row:hover { background: var(--accent-soft); }
    .participant-name { font-weight: 800; line-height: 1.45; }
    .participant-grade,
    .participant-gender {
      color: var(--muted);
      font-weight: 800;
      text-align: center;
    }
    .event-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
      line-height: 1.45;
    }
    .event-text {
      color: #21313a;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .event-text::before {
      content: "";
      display: inline-block;
      width: 5px;
      height: 5px;
      margin-right: 6px;
      border-radius: 50%;
      background: var(--accent);
      vertical-align: 2px;
    }
    a { color: var(--accent); }
    .footer { color: var(--muted); font-size: 13px; line-height: 1.7; margin-top: 16px; }
    @media (max-width: 900px) {
      .wrap { padding: 16px 12px 28px; }
      .hero, .panel { border-radius: 14px; }
      .controls { grid-template-columns: 1fr; }
      .panel { padding: 12px; }
      .group-list { border-radius: 12px; }
      .prefecture-title { padding: 11px 12px; font-size: 16px; border-left-width: 4px; }
      .school-title { padding: 9px 12px; font-size: 13px; }
      .participant-header,
      .participant-row {
        grid-template-columns: minmax(88px, 1fr) 28px 28px minmax(0, 1.9fr);
        gap: 6px;
      }
      .participant-header {
        padding: 6px 12px;
        font-size: 10px;
      }
      .participant-row {
        padding: 8px 12px;
      }
      .participant-name,
      .participant-grade,
      .participant-gender,
      .event-text { font-size: 12px; }
      .event-list { gap: 2px 9px; }
      .event-text::before { width: 4px; height: 4px; margin-right: 4px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>インターハイ予選 出場者 2026</h1>
      <p class="subtitle">都道府県大会の予選・決勝・タイム決勝を対象に、標準記録突破または決勝/タイム決勝8位以内でブロック予選出場対象となる選手を表示します。</p>
      <div class="nav">
        <a href="./index.html">トップ</a>
        <a href="./boys.html">男子得点</a>
        <a href="./girls.html">女子得点</a>
        <a href="./rankings.html">結合ランキング</a>
        <a href="./tournaments.html">大会一覧</a>
      </div>
    </section>

    <section class="panel">
      <div class="controls">
        <div>
          <label for="block-select">ブロック</label>
          <select id="block-select"></select>
        </div>
        <div>
          <label for="search-input">検索</label>
          <input id="search-input" type="search" placeholder="選手・学校・都道府県・種目">
        </div>
      </div>
      <div id="summary" class="summary"></div>
    </section>

    <section class="panel">
      <div id="qualifier-body" class="group-list"></div>
    </section>

    <section class="footer">
      <p>標準記録は日本水泳連盟「第94回 日本高等学校選手権水泳競技大会」の標準記録を使用しています。</p>
      <p>氏名横の（パ）はパンパシフィック選手権代表、（ジ）はジュニアパンパシフィック選手権代表を示します。</p>
    </section>
  </div>

  <script src="./ranking-data.js"></script>
  <script src="./international-representatives.js"></script>
  <script src="./interhigh-standards.js"></script>
  <script>
    const data = window.SWIM_RANKING_DATA;
    const allRows = data.allRows && data.allRows.length ? data.allRows : data.rows;
    const blocks = window.INTERHIGH_BLOCKS;
    const standardTimes = window.INTERHIGH_STANDARD_TIMES;
    const blockSelect = document.getElementById("block-select");
    const searchInput = document.getElementById("search-input");
    const summary = document.getElementById("summary");
    const body = document.getElementById("qualifier-body");

    function normalizeEventKey(eventKey) {
      return eventKey.split("|").slice(0, 3).join("|");
    }

    function normalizeName(name) {
      return String(name || "").replace(/\s+/g, "");
    }

    function normalizeSchoolNameForTeam(school) {
      return String(school || "").trim().replace(/(?:高校|高)$/, "");
    }

    function parseTimeToCentis(value) {
      if (!value || value === "-----") return null;
      const parts = value.split(":");
      if (parts.length === 1) {
        const [seconds, centis] = parts[0].split(".");
        return Number(seconds) * 100 + Number(centis);
      }
      const [minutes, rest] = parts;
      const [seconds, centis] = rest.split(".");
      return (Number(minutes) * 60 + Number(seconds)) * 100 + Number(centis);
    }

    const standardCentis = new Map(
      Object.entries(standardTimes).map(([key, value]) => [key, parseTimeToCentis(value)])
    );
    const eventOrders = new Map(
      data.events.map((event, index) => [normalizeEventKey(event.eventKey), index])
    );

    const representativeMarkers = new Map(
      (window.SWIM_INTERNATIONAL_REPRESENTATIVES || []).map((item) => [
        normalizeName(item.name),
        item.marker,
      ])
    );

    function formatName(row) {
      const marker = representativeMarkers.get(normalizeName(row.name));
      return marker && !row.isRelay ? `${row.name}（${marker}）` : row.name;
    }

    function isTop8Division(row) {
      const name = row.divisionName || "";
      if (name.includes("タイム決勝")) return true;
      return name.includes("決勝") && !name.includes("B");
    }

    function rowIdentity(row) {
      return [
        normalizeEventKey(row.eventKey),
        row.resultId || "",
        row.name || "",
        row.school || "",
        row.prefecture || "",
        row.time || "",
      ].join("|");
    }

    function relayMembers(row) {
      if (Array.isArray(row.relayMemberDetails) && row.relayMemberDetails.length) {
        return row.relayMemberDetails;
      }
      return String(row.relayMembers || "")
        .split("/")
        .map((name) => name.trim())
        .filter(Boolean)
        .map((name) => ({ name, schoolGrade: "-" }));
    }

    function eventSortKey(row) {
      return eventOrders.get(normalizeEventKey(row.eventKey)) ?? 999;
    }

    function shortEventLabel(label) {
      return String(label || "")
        .replace(/^(男子|女子)\s+/, "")
        .replace("フリーリレー", "FR")
        .replace("メドレーリレー", "MR")
        .replace("個人メドレー", "IM")
        .replace("バタフライ", "Fly")
        .replace("平泳ぎ", "Br")
        .replace("背泳ぎ", "Ba")
        .replace("自由形", "Fr");
    }

    function genderLabel(row) {
      return row.genderCode === 1 || row.genderName === "男子" ? "男" : "女";
    }

    function gradeNumber(grade) {
      return String(grade || "-").replace(/年/g, "") || "-";
    }

    function gradeValue(grade) {
      const value = Number(gradeNumber(grade));
      return Number.isFinite(value) ? value : 0;
    }

    function genderOrder(gender) {
      return gender === "男" ? 0 : 1;
    }

    function buildQualifyingRows(blockName) {
      const block = blocks.find((item) => item.name === blockName) || blocks[0];
      const prefectures = new Set(block.prefectures);
      const rows = allRows
        .filter((row) => prefectures.has(row.prefecture))
        .filter((row) => row.timeCentis != null);

      const qualifyingRows = new Map();

      function add(row) {
        qualifyingRows.set(rowIdentity(row), row);
      }

      for (const row of rows) {
        const eventKey = normalizeEventKey(row.eventKey);
        const standard = standardCentis.get(eventKey);
        if (standard != null && row.timeCentis <= standard) {
          add(row);
        }
      }

      const groups = new Map();
      for (const row of rows.filter(isTop8Division)) {
        const key = [row.tournamentCode, normalizeEventKey(row.eventKey), row.divisionName].join("|");
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(row);
      }

      for (const groupRows of groups.values()) {
        groupRows
          .slice()
          .sort((left, right) => left.timeCentis - right.timeCentis || left.name.localeCompare(right.name, "ja"))
          .slice(0, 8)
          .forEach(add);
      }

      return [...qualifyingRows.values()].sort(
        (left, right) =>
          left.eventLabel.localeCompare(right.eventLabel, "ja") ||
          left.timeCentis - right.timeCentis ||
          left.name.localeCompare(right.name, "ja")
      );
    }

    function buildParticipants(blockName) {
      const participants = new Map();

      function ensureParticipant(name, school, grade, gender, prefecture) {
        const key = normalizeName(name);
        const normalizedSchool = normalizeSchoolNameForTeam(school);
        if (!participants.has(key)) {
          participants.set(key, {
            name,
            school: normalizedSchool,
            schoolGrade: grade || "-",
            gender,
            prefecture,
            events: new Map(),
          });
        }
        const participant = participants.get(key);
        if ((!participant.schoolGrade || participant.schoolGrade === "-") && grade && grade !== "-") {
          participant.schoolGrade = grade;
        }
        return participant;
      }

      for (const row of buildQualifyingRows(blockName)) {
        const members = row.isRelay ? relayMembers(row) : [{ name: row.name, schoolGrade: row.schoolGrade }];
        for (const member of members) {
          const participant = ensureParticipant(member.name, row.school, member.schoolGrade, genderLabel(row), row.prefecture);
          const eventKey = normalizeEventKey(row.eventKey);
          if (!participant.events.has(eventKey)) {
            participant.events.set(eventKey, {
              key: eventKey,
              label: shortEventLabel(row.eventLabel),
              sortKey: eventSortKey(row),
            });
          }
        }
      }

      return [...participants.values()]
        .map((participant) => ({
          ...participant,
          eventList: [...participant.events.values()].sort((left, right) => left.sortKey - right.sortKey),
        }))
        .sort(
          (left, right) =>
            left.prefecture.localeCompare(right.prefecture, "ja") ||
            left.school.localeCompare(right.school, "ja") ||
            genderOrder(left.gender) - genderOrder(right.gender) ||
            gradeValue(right.schoolGrade) - gradeValue(left.schoolGrade) ||
            left.name.localeCompare(right.name, "ja")
        );
    }

    for (const block of blocks) {
      const option = document.createElement("option");
      option.value = block.name;
      option.textContent = block.name;
      blockSelect.appendChild(option);
    }

    function render() {
      const blockName = blockSelect.value || blocks[0].name;
      const query = searchInput.value.trim().toLowerCase();
      let rows = buildParticipants(blockName);
      if (query) {
        rows = rows.filter((row) =>
          [row.name, row.school, row.prefecture, ...row.eventList.map((event) => event.label)].some((value) =>
            String(value || "").toLowerCase().includes(query)
          )
        );
      }

      summary.textContent = `${blockName} / ${rows.length}件`;
      body.innerHTML = "";
      const prefectureGroups = new Map();
      for (const row of rows) {
        const prefecture = row.prefecture || "-";
        const school = normalizeSchoolNameForTeam(row.school) || "-";
        if (!prefectureGroups.has(prefecture)) prefectureGroups.set(prefecture, new Map());
        const schoolGroups = prefectureGroups.get(prefecture);
        if (!schoolGroups.has(school)) schoolGroups.set(school, []);
        schoolGroups.get(school).push(row);
      }

      for (const [prefecture, schoolGroups] of prefectureGroups.entries()) {
        const prefectureSection = document.createElement("section");
        prefectureSection.className = "prefecture-group";
        prefectureSection.innerHTML = `<div class="prefecture-title">${prefecture}</div>`;

        for (const [school, participants] of schoolGroups.entries()) {
          const schoolSection = document.createElement("section");
          schoolSection.className = "school-group";
          schoolSection.innerHTML = `
            <div class="school-title">学校名: ${school}</div>
            <div class="participant-header">
              <div>氏名</div>
              <div>学年</div>
              <div>性別</div>
              <div>出場種目</div>
            </div>
          `;

          for (const row of participants) {
            const participant = document.createElement("div");
            participant.className = "participant-row";
            participant.innerHTML = `
              <div class="participant-name">${formatName(row)}</div>
              <div class="participant-grade">${gradeNumber(row.schoolGrade)}</div>
              <div class="participant-gender">${row.gender || "-"}</div>
              <div class="event-list">
                ${row.eventList.map((event) => `<span class="event-text">${event.label}</span>`).join("")}
              </div>
            `;
            schoolSection.appendChild(participant);
          }

          prefectureSection.appendChild(schoolSection);
        }

        body.appendChild(prefectureSection);
      }
    }

    blockSelect.addEventListener("change", render);
    searchInput.addEventListener("input", render);
    render();
  </script>
</body>
</html>
