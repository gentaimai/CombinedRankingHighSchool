name: Update and Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: combined-ranking-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Detect data refresh need
        id: data-refresh
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Data refresh required for scheduled/manual run"
            exit 0
          fi

          if [[ ! -f ranking-data.js ]]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Data refresh required because ranking-data.js is missing"
            exit 0
          fi

          if ! grep -q '"allRows"' ranking-data.js; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Data refresh required because ranking-data.js does not include allRows"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [[ "$before" =~ ^0+$ ]]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Data refresh required for initial push"
            exit 0
          fi

          git diff --name-only "$before" "${{ github.sha }}" > changed-files.txt
          cat changed-files.txt

          if grep -Eq '^(build_rankings\.py|requirements.*|pyproject\.toml|uv\.lock)$' changed-files.txt; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Data refresh required because data generation files changed"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping data refresh; only existing ranking-data.js will be deployed"
          fi

      - name: Refresh ranking data
        if: steps.data-refresh.outputs.needed == 'true'
        run: python build_rankings.py

      - name: Commit refreshed data
        if: steps.data-refresh.outputs.needed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ranking-data.js
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "push" ]]; then
            git commit -m "chore: refresh ranking data [skip ci]"
          else
            git commit -m "chore: refresh ranking data"
          fi
          git push origin HEAD:main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
