<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高校総体予選 2026</title>
  <style>
    :root {
      --bg: #eef3f1;
      --panel: rgba(255,255,255,0.94);
      --ink: #16212a;
      --muted: #68737d;
      --line: rgba(22,33,42,0.12);
      --accent: #0f6f8c;
      --shadow: 0 18px 50px rgba(22,33,42,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15,111,140,0.14), transparent 26%),
        radial-gradient(circle at top right, rgba(59,154,120,0.10), transparent 20%),
        linear-gradient(180deg, #f8fbfa 0%, var(--bg) 100%);
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 36px 18px 28px; }
    .hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 50px);
      line-height: 1.04;
    }
    .subtitle { margin: 0; color: var(--muted); line-height: 1.7; }
    .links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }
    .link-card {
      display: block;
      min-height: 112px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      text-decoration: none;
    }
    .link-card b { display: block; font-size: 22px; margin-bottom: 8px; }
    .link-card span { color: var(--muted); line-height: 1.6; }
    .link-card:hover { border-color: rgba(15,111,140,0.45); background: #f6fbfd; }
    .updated {
      margin: 18px 2px 0;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }
    @media (max-width: 720px) {
      .wrap { padding: 18px 12px 24px; }
      .hero { border-radius: 18px; padding: 22px; }
      .links { grid-template-columns: 1fr; }
      .updated { text-align: left; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>高校総体予選 2026</h1>
      <p class="subtitle">学校対抗得点、個人・リレーの結合ランキング、大会一覧を確認できます。</p>
      <div class="links">
        <a class="link-card" href="./boys.html"><b>男子得点</b><span>男子学校対抗得点</span></a>
        <a class="link-card" href="./girls.html"><b>女子得点</b><span>女子学校対抗得点</span></a>
        <a class="link-card" href="./rankings.html"><b>結合ランキング</b><span>個人・リレー種目別ランキング</span></a>
        <a class="link-card" href="./tournaments.html"><b>大会一覧</b><span>都道府県別の対象大会</span></a>
      </div>
    </section>
    <p class="updated">最新のウェブ更新日: <span id="generated-at">-</span></p>
  </main>
  <script src="./ranking-data.js"></script>
  <script>
    document.getElementById("generated-at").textContent = window.SWIM_RANKING_DATA.generatedAt;
  </script>
</body>
</html>
