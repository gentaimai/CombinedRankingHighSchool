<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高校総体予選 2026</title>
  <style>
    :root {
      --bg: #f3f1eb;
      --panel: rgba(255,255,255,0.92);
      --ink: #16212a;
      --muted: #65717b;
      --line: rgba(22,33,42,0.12);
      --accent: #0d6f8b;
      --accent2: #cb6f2b;
      --shadow: 0 22px 60px rgba(22,33,42,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(13,111,139,0.14), transparent 24%),
        radial-gradient(circle at right top, rgba(203,111,43,0.12), transparent 22%),
        linear-gradient(180deg, #faf8f4 0%, var(--bg) 100%);
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 48px; }
    .hero, .cards {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }
    .hero { padding: 30px; margin-bottom: 18px; }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      max-width: 840px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      padding: 18px;
    }
    .card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.1;
    }
    .card p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.7;
    }
    .button {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 800;
      color: white;
      background: var(--accent);
    }
    .button.alt { background: var(--accent2); }
    .footer {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      margin-top: 18px;
    }
    @media (max-width: 900px) {
      .cards { grid-template-columns: 1fr; }
      .wrap { padding: 18px 14px 28px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>高校総体予選<br>2026</h1>
      <p class="subtitle">都道府県ごとの大会一覧と、公開済み詳細結果を横断した結合ランキングへの入口です。</p>
    </section>
    <section class="cards">
      <article class="card">
        <h2>大会一覧</h2>
        <p>47都道府県の対象大会名、日程、会場、リンク、現在ステータスを一覧で確認できます。</p>
        <a class="button" href="./tournaments.html">大会一覧を見る</a>
      </article>
      <article class="card">
        <h2>結合ランキング</h2>
        <p>公開済みの大会詳細結果だけを集約し、種目ごとに記録順で比較できます。</p>
        <a class="button alt" href="./rankings.html">ランキングを見る</a>
      </article>
    </section>
    <section class="footer">
      <p>データソース: <a href="https://result.swim.or.jp/">result.swim.or.jp</a></p>
    </section>
  </div>
</body>
</html>
