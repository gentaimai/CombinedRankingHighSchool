<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>男子学校対抗得点 2026</title>
  <style>
    :root {
      --bg: #eef3f1;
      --panel: rgba(255,255,255,0.94);
      --ink: #16212a;
      --muted: #68737d;
      --line: rgba(22,33,42,0.12);
      --accent: #0f6f8c;
      --accent-soft: #eef7fb;
      --shadow: 0 18px 50px rgba(22,33,42,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15,111,140,0.14), transparent 26%),
        radial-gradient(circle at top right, rgba(59,154,120,0.10), transparent 20%),
        linear-gradient(180deg, #f8fbfa 0%, var(--bg) 100%);
    }
    .wrap { max-width: 1600px; margin: 0 auto; padding: 28px 18px 40px; }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    .hero { padding: 26px; margin-bottom: 18px; }
    h1 { margin: 0 0 10px; font-size: clamp(30px, 5vw, 50px); line-height: 1.02; letter-spacing: -0.03em; }
    .subtitle { margin: 0; color: var(--muted); line-height: 1.7; max-width: 900px; }
    .nav { margin-top: 18px; }
    .nav a { color: var(--accent); text-decoration: none; font-weight: 700; margin-right: 16px; }
    .panel { padding: 18px; }
    .controls { max-width: 280px; margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
    select { width: 100%; border: 1px solid var(--line); border-radius: 14px; padding: 13px 14px; font: inherit; background: white; color: var(--ink); }
    .table-wrap { overflow: auto; border-radius: 18px; border: 1px solid var(--line); background: white; }
    table { width: 100%; border-collapse: collapse; min-width: 1500px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid var(--line); text-align: center; font-size: 13px; }
    th { position: sticky; top: 0; z-index: 1; background: #f3fafc; color: var(--muted); font-size: 12px; }
    th:nth-child(2), td:nth-child(2) { text-align: left; min-width: 180px; }
    td.total, td.rank, td.school { font-weight: 800; }
    tbody tr:hover { background: var(--accent-soft); }
    .footer { color: var(--muted); font-size: 13px; line-height: 1.7; margin-top: 16px; }
    @media (max-width: 900px) { .wrap { padding: 16px 12px 28px; } }
  </style>
</head>
<body data-gender="men">
  <div class="wrap">
    <section class="hero">
      <h1 id="page-title"></h1>
      <p id="page-subtitle" class="subtitle"></p>
      <div class="nav">
        <a href="./index.html">トップ</a>
        <a href="./boys.html">男子得点</a>
        <a href="./girls.html">女子得点</a>
        <a href="./rankings.html">結合ランキング</a>
        <a href="./interhigh.html">ブロック予選</a>
        <a href="./tournaments.html">大会一覧</a>
      </div>
    </section>
    <section class="panel">
      <div class="controls">
        <label for="block-select">ブロック</label>
        <select id="block-select">
          <option value="">全国</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="score-head"></thead>
          <tbody id="score-body"></tbody>
        </table>
      </div>
    </section>
    <section class="footer">
      <p>出典: <a href="https://result.swim.or.jp/">result.swim.or.jp</a> の公開結果。短水路記録を含む場合があります。</p>
    </section>
  </div>
  <script src="./ranking-data.js"></script>
  <script src="./international-representatives.js"></script>
  <script src="./interhigh-standards.js"></script>
  <script src="./school-standings.js"></script>
</body>
</html>
